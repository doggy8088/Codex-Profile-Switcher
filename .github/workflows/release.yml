name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: macos-latest

    env:
      APP_NAME: Codex Profiles
      PROJECT_PATH: Codex Profile Switcher.xcodeproj
      SCHEME_NAME: CodexProfileSwitcher
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build app
        run: |
          set -euo pipefail

          SIGNING_ARGS=(CODE_SIGNING_ALLOWED=NO)
          if [[ -n "${APPLE_CERTIFICATE_BASE64}" && -n "${APPLE_CERTIFICATE_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
            SIGNING_ARGS=(
              CODE_SIGN_STYLE=Manual
              DEVELOPMENT_TEAM="${APPLE_TEAM_ID}"
              CODE_SIGN_IDENTITY="Developer ID Application"
              OTHER_CODE_SIGN_FLAGS="--timestamp"
            )
          fi

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            "${SIGNING_ARGS[@]}" \
            build

          APP_PATH="build/DerivedData/Build/Products/Release/${APP_NAME}.app"
          if [[ -z "${APPLE_CERTIFICATE_BASE64}" || -z "${APPLE_CERTIFICATE_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            codesign --force --deep --sign - "$APP_PATH"
          fi

      - name: Package app
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="build/DerivedData/Build/Products/Release/${APP_NAME}.app"
          ZIP_PATH="build/${APP_NAME// /-}-${VERSION}.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          printf '%s  %s\n' "$SHA256" "$ZIP_PATH" > "$ZIP_PATH.sha256"

      - name: Notarize app
        if: ${{ env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release/${APP_NAME}.app"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          printf '%s  %s\n' "$SHA256" "$ZIP_PATH" > "$ZIP_PATH.sha256"

      - name: Update Homebrew cask
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          perl -0pi -e "s/version \"[^\"]+\"/version \"$ENV{VERSION}\"/" Casks/codex-profile-switcher.rb
          perl -0pi -e "s/sha256 \"[a-f0-9]+\"/sha256 \"$ENV{SHA256}\"/" Casks/codex-profile-switcher.rb

          if git diff --quiet -- Casks/codex-profile-switcher.rb; then
            echo "Cask already matches ${VERSION}."
            exit 0
          fi

          git add Casks/codex-profile-switcher.rb
          commit_msg_file="$(mktemp -t codex-commit-message)"
          printf 'chore(cask): update to %s\n\nUpdate Homebrew cask version and sha256 for the tagged release.\n' "$VERSION" > "$commit_msg_file"
          git commit -F "$commit_msg_file"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping release creation."
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            "$ZIP_PATH" \
            "$ZIP_PATH.sha256" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release build for ${APP_NAME} ${VERSION}."
